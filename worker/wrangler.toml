name = "afterset-capture"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

routes = [
  { pattern = "afterset.net/c/*", zone_name = "afterset.net" },
  { pattern = "afterset.net/api/capture", zone_name = "afterset.net" }
]

[[r2_buckets]]
binding = "PAGES"
bucket_name = "afterset-capture-pages"

# Rate limiting KV namespace — create with: wrangler kv:namespace create RATE_LIMITS
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "PLACEHOLDER_REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
SUPABASE_URL = "https://mnoajavdnawrmqsnbouy.supabase.co"
